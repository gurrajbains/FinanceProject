<!DOCTYPE html>
<html width="2000px" height="1000px">
<head>
  <title>Finance Manager</title>

  <style>
    body{
      html, body {
  overflow-x: hidden;
}

      margin: 0;
      background-image:url("{{ url_for('static', filename='background.jpg') }}");
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    ul {
      list-style-type: none;
      margin: 0;
      padding: 0;
      background-color: #333333;
      display: flex;
      justify-content: center;
      height: 75px;
    }

    ul li {
      position: relative;
    }

    ul li a {
      display: block;
      color: white;
      text-align: center;

      padding: 14px 16px;
      text-decoration: none;
    }

    ul li a:hover {
      background-color: #ad5151;
    }

   
    .content {
      padding: 12px;
    }

    .table-containment {
      overflow: auto;
      height: 550px;
      position: relative;
      background: rgba(255,255,255,0.90);
      padding: 8px;
      width: min(1800px, 100%); 
      border-radius: 20px;
      overflow-x: hidden
    }

    table {
       margin-left: 20px;
      align-content: center;
      width: min(1750px, 100%);     
      border-radius: 20px;

    }

    tr,th, td {
    padding: 10px;
    text-align: center;
    border-radius: 20px;
    border: 1px solid #000000;
    
    }
     

    thead th {
      margin-left: 15px;
      position: sticky; 
      top: 0; border-radius:20px;
      position: relative;
      border-style: hidden;

 
      background: rgb(192, 154, 154);
      z-index: 2;
    }

 
    .toolbar {
      display: flex;
      justify-content: flex-start;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
      padding: 10px;
      width: min(1800px, 100%);
      background: rgba(200, 177, 177, 0.9);
      border-radius: 20px;
    }

    .toolbar form {
      display: inline-block;
    }

    .add-form input{
      margin: 6px 6px 6px 0;
      padding: 8px;
         padding: 8px;
         border-radius: 12px;
    }
    .add-form select {
      margin: 6px 6px 6px 0;
      padding: 8px;
      padding: 8px;
      border-radius: 12px;
        width: 125px;

    }
    .toolbar input {
      padding: 8px;
      margin: 6px 0;
      border-radius: 12px;
      text-align: left;
    }

    .add-form button,
    .action-buttons button {
      padding: 8px 12px;
      border-radius: 12px;
      margin: 6px 6px 6px 0;
      cursor: pointer;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .canvas {
      margin-top: -645px;
      margin-left: 1860px;
      width: 500px;
      height: 290px;
      background: rgba(200, 177, 177, 0.9);
      border-radius: 20px;
      padding: 10px;
    }

  .graphic-settings {
  margin-top: 0px;
  padding-top: 10px;
  margin-left: 1860px;
  width : 470px;
  height: 30px;
  border-radius: 20px; 
  padding-left: 50px;
  background-color: #ad5151;
  display: flex;  
  position: relative;
  button:hover {
    background-color: #ad5151;
    cursor: pointer;
  }
}

.secCanvas {
margin-top: 20px;
position: relative;
      margin-left: 1860px;
      width: 500px;
      height: 290px;
      background: rgba(200, 177, 177, 0.9);
      border-radius: 20px;
      padding: 10px;
    }
 
   
  </style>
</head>
<body style="overflow-x: hidden;">
  <ul>
    <li><a href="http://127.0.0.1:5000/#home">Base</a></li>
    <li><a href="http://127.0.0.1:5000/#home">Rates</a></li>
    <li><a href="http://127.0.0.1:5000/#home">Expectations</a></li>
    <li><a href="http://127.0.0.1:5000/#home">Statistics</a></li>
    <li><a href="http://127.0.0.1:5000/#home">Settings</a></li>
    <li><a href="http://127.0.0.1:5000/#home">Market</a></li>
  </ul>
  <div class="content">
    <div class="table-containment">
      <table  frame="red" rules="rows">
        <thead>
          <tr style="border-bottom: 1px solid #ffffff;">
            <th>Transaction ID</th>
            <th>Date</th>
            <th>Amount</th>
            <th>Type</th>
            <th>Source</th>
            <th>Description</th>
          </tr>
        </thead>

        <tbody>
          {% for row in rows %}
          <tr>
            <td>{{row[0]}}</td>
            <td>{{row[1].split('-')[1] }}-{{ row[1].split('-')[2] }}-{{ row[1].split('-')[0] }}</td>
            <td>{{row[2]}}</td>
            <td>{{row[3]}}</td>
            <td>{{row[4]}}</td>
            <td>{{row[5]}}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>

    <div class="toolbar">
      <div class="add-form">
        <form action="/add" method="POST">
          <input type="name" name="name" placeholder="Name" required minlength="2" maxlength="50">
          <input type="text" name="date" placeholder="MM-DD-YYYY" required pattern="^(0[1-9]|1[0-2])-(0[1-9]|[12][0-9]|3[01])-\d{4}$" title="Please enter a date in the format MM-DD-YYYY">
          <input type="number" name="amount" step="0.01" placeholder="Amount" required  number-only max = "100000000000" min = "0" title ="Please enter a valid amount">

          <select style="width: 100px;" name="type" required>
            <option value="">Select Type</option>
            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>

          <input type="text" name="source" placeholder="Source" required text-only minlength="2" maxlength="50" title="Please enter a valid source">
          <input type="text" name="description" placeholder="Description (optional)" maxlength="100">

          <button type="submit">Add</button>
        </form>
      </div>

      <div class="action-buttons">
        <form action="/delete" method="POST">
          <button type="submit">Delete</button>
        </form>

        <form action="/export" method="GET">
          <button type="submit">Export</button>
        </form>
        <form action ="/sort" method="GET">
          <button type="submit">Sort</button>
          <select style="width: 75px;" name="sort_by" required >
            <option value="">Select</option>
            <option value="date">Date</option>
            <option value="amount">Amount</option>
          </select>
          <select style="width: 75px;" name="type" required>
            <option value="">Select</option>
            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>
        </form>
        <div class="searchbar">
          <form action="/search" method="GET">
            <input type="text" name="query" placeholder="Search.." maxlength="100">
            <button type="submit">Search</button>
            
        </form> </form>
        
</div><div class="reset">
          <form action="/reset_Search" method="POST">
            <button type="submit">Reset</button>
            
        </form>  
          
         </div>
      </div>
    </div>
    <div class="canvasWrapper">
     <div class ="canvas"><canvas id="graphic-Canvas"></canvas></div>
      <div class = "graphic-settings"> 
          <select style="width: 75px;" onchange="fetchDataAndRenderChart(this)" name="graphic" required>  
            <option value="line" selected>Line</option>
            <option value="bar">Bar</option>
            <option value="pie">Pie</option>
            <option value="doughnut">Doughnut</option>
            <option value="radar">Radar</option>
            <option value="polarArea">Polar Area</option>
            <option value="bubble">Bubble</option>
            <option value="scatter">Scatter</option>
          </select>
    </div>
<div class ="secCanvas"><canvas id="graphic-Canvas-2"></canvas></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script> 
<script>

async function fetchDataAndRenderChart(graphic) {
  const response = await fetch("/api/get_by_month");
  const data = await response.json();

  const canvasEl = document.getElementById("graphic-Canvas");
  const ctx = canvasEl.getContext("2d");


if(Chart.getChart(canvasEl)) {
  Chart.getChart(canvasEl).destroy();
}
new Chart(ctx, {
    type: graphic.value,
    data: {
      labels: data.labels,
      datasets: [{
        label: "date vs income",
        data: data.values,
        borderColor: "rgba(255, 99, 132, 1)",
        backgroundColor: "rgba(255, 99, 132, 0.2)",
        color: "rgba(0, 0, 0, 1)",
        font: {
          size: 14,
          family: "Arial",
          weight: "bold"
        }
      }]
    }
  });
  
  }fetchDataAndRenderChart();
</script>
<script>
async function fetchDataAndRenderChart2() {
  const response = await fetch("/api/get_by_month");
  const data = await response.json();

  const canvasEl = document.getElementById("graphic-Canvas-2");
  const ctx = canvasEl.getContext("2d");

  new Chart(ctx, {
    type: "line",
    data: {
      labels: data.labels,
      datasets: [{
        label: "date vs income",
        data: data.values,
        borderColor: "rgba(255, 99, 132, 1)",
        backgroundColor: "rgba(0, 99, 132, 0.2)",
        color: "rgba(0, 0, 0, 1)",
        font: {
          size: 14,
          family: "Arial",
          weight: "bold"
        }
      }]
    }
  });
}
fetchDataAndRenderChart2();
</script>

  

</body>
</html>
