<!DOCTYPE html>
<html width="100%" height="100%">
<head>
  <title>Finance Manager</title>

  <style>

* { box-sizing: border-box; }

html, body {
  height: 100%;
}

body {
  margin: 0;
  background-image: url("{{ url_for('static', filename='background.jpg') }}");
  background-size: cover;
  background-repeat: no-repeat;
  background-attachment: fixed;
  overflow-x: hidden;
}


.content {
  display: grid;
  grid-template-columns: minmax(620px, 1fr) minmax(340px, 520px);
  gap: 20px;
  padding: 20px;
  align-items: start;
}

.leftColumn {
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-width: 0;             
}


.canvasWrapper {
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-width: 0;
}


@media (max-width: 1100px) {
  .content {
    grid-template-columns: 1fr;
  }
}


.table-containment {
  width: 100%;
  background: rgba(255,255,255,0.90);
  border-radius: 18px;
  padding: 10px;
  height: 585px;
  overflow: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin: 0;               
}

thead th {
  position: sticky;
  top: 0;
  background: rgb(192, 154, 154);
  z-index: 2;
  border: 1px solid rgba(0,0,0,0.25);
}

th, td {
  padding: 10px;
  text-align: center;
  border: 1px solid rgba(0,0,0,0.25);
}

.toolbar,
.action-bar {
  width: 100%;
  text-align: center;
  background: rgba(200, 177, 177, 0.9);
  border-radius: 18px;
  padding: 10px;
  display: flex;
  
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}


.add-form form {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}


.add-form input,
.add-form select,
.action-bar input,
.action-bar select {
  height: 34px;
  padding: 6px 10px;
  border-radius: 12px;
  border: 1px solid rgba(0,0,0,0.25);
  background: rgba(255,255,255,0.95);
}


button {
  height: 34px;
  padding: 6px 12px;
  border-radius: 12px;
  border: 1px solid rgba(0,0,0,0.25);
  cursor: pointer;
}

.action-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}


.canvas,
.secCanvas {
  width: 100%;
  background: rgba(200, 177, 177, 0.9);
  border-radius: 18px;
  padding: 10px;
}


.canvas { height: 290px; }
.secCanvas { height: 290px; }


.canvas canvas,
.secCanvas canvas {
  width: 100% ;
  height: 100% ;
}


.graphic-settings {
  width: 100%;
  background-color: #ad5151;
  border-radius: 18px;
  padding: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  justify-content: center;
}

.graphic-settings select,
.graphic-settings input {
  height: 34px;
  border-radius: 12px;
  border: 1px solid rgba(0,0,0,0.25);
  padding: 6px 10px;
}


.graphic-settings button:hover,
button:hover {
background-color: #ad5151;}

  </style>
</head>
<body style="overflow-x: hidden;">
  <div class="content">
    <div class = "leftColumn">
    <div class="table-containment">
  <form id="delete-form" action="/delete" method="POST">
    <table rules = "rows">
      <thead>
        <tr>
          <th>
            <input type="checkbox" id="select-all"
              onclick="document.querySelectorAll('input[name=delete_ids]').forEach(cb => cb.checked = this.checked);">
          </th>
          <th>Transaction ID</th>
          <th>Date</th>
          <th>Amount</th>
          <th>Type</th>
          <th>Source</th>
          <th>Description</th>
        </tr>
      </thead>

      <tbody>
        {% for row in rows %}
        <tr>
          <td><input type="checkbox" name="delete_ids" value="{{ row[0] }}"></td>
          <td>{{ row[1] }}</td>
          <td>{{ row[2].split('-')[1] }}-{{ row[2].split('-')[2] }}-{{ row[2].split('-')[0] }}</td>
          <td>{{ row[3] }}</td>
          <td>{{ row[4] }}</td>
          <td>{{ row[5] }}</td>
          <td>{{ row[6] }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </form>
</div>

    <div class="toolbar">
      <div class="add-form">
        <form action="/add" method="POST">

            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>

          <input style = "width:80px;"  type="text" name="source" placeholder="Source" required text-only minlength="1" maxlength="50" title="Please enter a valid source">
          <input  style = "width:115px;"  type="text" name="description" placeholder="Desc (optional)" maxlength="100">

          <button type="icon-btn">
            <img src="{{ url_for('static', filename='icons/add-icon.png') }}" alt="Add" style="width: 16px; height: 16px;">

      </div>
    <div class ="action-bar">
      <div class="action-buttons">
          <button type="icon-btn" form="delete-form">
            <img src="{{ url_for('static', filename='icons/tash-icon.png') }}" alt="Delete"style="width: 16px; height: 16px;">
          </button>
        <form action="/export" method="GET">
          <button type="icon-btn">
            <img src="{{ url_for('static', filename='icons/export.png') }}" alt="Export" style="width: 16px; height: 16px;">
        </form>





     <form action="/import" method="POST" enctype="multipart/form-data">

    <img src="{{ url_for('static', filename='icons/export.png') }}" style="width:16px;height:16px;">
  </button>

</form>

        
        <form action ="/sort" method="POST">
          <button type="icon-btn">
            <img src="{{ url_for('static', filename='icons/filter.png') }}" alt="Sort" style="width: 16px; height: 16px;">
          </button>
          <select style="width: 75px;" name="sort_by" required >

            <option value="date">Date</option>
            <option value="amount">Amount</option>

          <select style="width: 75px;" name="type" required>
            <option value="">Select</option>
            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>
        </form>
        <div class="searchbar">
          <form action="/search" method="GET">

              <img src="{{ url_for('static', filename='icons/search-icon.png') }}" alt="Search" style="width: 16px; height: 16px;">
              </button>
        </form> 
        
</div><div class="reset">

            <button type="icon-btn">
              <img src="{{ url_for('static', filename='icons/reset-icon.png') }}" alt="Reset" style="width: 16px; height: 17px;">
            </button>
            
        </form>  
          
         </div>
      </div>
      </div>
        </div>    

    </div>

      <div class = "graphic-settings">

    <div class = "graphic-settings">

              <option value="line" selected>Line</option>
              <option value="bar">Bar</option>

</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

fileInput.addEventListener("change", () => {

    const fileName = fileInput.files[0]?.name;

    if (fileName) {
        importBtn.textContent = fileName;
    }

});
</script>
<script>
function renderChart({
  canvasId,
  chartType = "line",
  labels = [],
  values = [],
  datasetLabel = "date vs value",
  borderColor = "rgba(255, 99, 132, 1)",
  fillColor = "rgba(255, 99, 132, 0.2)"
}) {

const canvasEl = document.getElementById(canvasId);
  const ctx = canvasEl.getContext("2d");
  const existingChart = Chart.getChart(canvasEl);
  if (existingChart) existingChart.destroy();

  if (!labels.length || !values.length) return;

  const isPieLike =
    chartType === "pie" ||
    chartType === "doughnut" ||
    chartType === "polarArea";

  const palette = [
    "#FF6384","#36A2EB","#FFCE56",
    "#4BC0C0","#9966FF","#FF9F40","#C9CBCF"
  ];

  const dataset = isPieLike
    ? {
        label: datasetLabel,
        data: values,
        backgroundColor: palette.slice(0, values.length),
        borderWidth: 1
      }
    : {
        label: datasetLabel,
        data: values,
        borderColor: borderColor,
        backgroundColor: fillColor,
        borderWidth: 2,
        pointRadius: 3,
        tension: 0.25,
        fill: true
      };

  new Chart(ctx, {
    type: chartType,
    data: {
      labels: labels,
      datasets: [dataset]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          labels: {
            color: "#111"
          }
        },
        tooltip: {
          callbacks: {
            label: function(context) {
              const value = context.parsed.y ?? context.parsed;
              if (typeof value === "number") {
                return context.dataset.label + ": $" + value.toFixed(2);
              }
              return context.dataset.label + ": " + value;
            }
          }
        }
      },
      scales: isPieLike ? {} : {
        x: {
          ticks: { color: "#111" },
          grid: { color: "rgba(0,0,0,0.1)" }
        },
        y: {
          ticks: { color: "#111" },
          grid: { color: "rgba(0,0,0,0.1)" }
        }
      }
    }
  });
}



async function fetchDataAndRenderChart(graphic) {

  graphic = graphic || document.getElementById("graphic-1");

  const timeRange = document.querySelector("input[name='timeRange1']").value;
  const metric = document.querySelector("select[name='metric']").value;
  const timeframe = document.querySelector("select[name='timeFrame']").value;

  const response = await fetch(
    "/api/make_graph?graphic=" + (graphic.value || "line") +
    "&timeRange=" + timeRange +
    "&metric=" + metric +
    "&timeFrame=" + timeframe
  );

  const data = await response.json();

  renderChart({
    canvasId: "graphic-Canvas",
    chartType: graphic.value || "line",
    labels: data.labels,
    values: data.values,
    datasetLabel: "date vs " + metric,
    borderColor: "rgba(255, 99, 132, 1)",
    fillColor: "rgba(255, 99, 132, 0.2)"
  });
}

async function fetchDataAndRenderChart2(graphic2) {

  graphic2 = graphic2 || document.getElementById("graphic-2");

  const timeRange = document.querySelector("input[name='timeRange2']").value;
  const metric = document.querySelector("select[name='metric2']").value;
  const timeframe = document.querySelector("select[name='timeFrame2']").value;

  const response = await fetch(
    "/api/make_graph?graphic=" + (graphic2.value || "line") +
    "&timeRange=" + timeRange +
    "&metric=" + metric +
    "&timeFrame=" + timeframe
  );

  const data = await response.json();

  renderChart({
    canvasId: "graphic-Canvas-2",
    chartType: graphic2.value || "line",
    labels: data.labels,
    values: data.values,
    datasetLabel: "date vs " + metric,
    borderColor: "rgba(54, 162, 235, 1)",
    fillColor: "rgba(54, 162, 235, 0.2)"
  });
}
fetchDataAndRenderChart();
fetchDataAndRenderChart2();
