<body style="background-color: rgb(207, 154, 154);">

    <tr style="border-bottom: 1px solid #ff0000;">
        <th> Transaction ID </th> 
        <th> Description </th>
        <th> Amount </th>
        <th> Date </th>
        <th> Category </th>
        <th> Type </th>
        <th> Data </th>
    </tr>
    <tbody> 
        <tr >
        {% for row in rows %}
        <td> {{row[1]}} </td>
        <td> {{row[6]}} </td>
        <td> {{row[3]}} </td>
        <td> {{row[2]}} </td>
        <td> {{row[5]}} </td>

     </tr>

    </tbody>

</table>
<style >
button  {
    border:  2px solid black;
    padding: 10px;
    font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
    display: inline-block;
    text-decoration: wavy;
    font-size: large;
    margin : 10px;
    gap: 100px;
    cursor: pointer;
} </style >
<script>
function update() {
    <button>View</button>
}
</script><form action="/add" method="POST">

  <select name="ttype" required>
    <option value="">Select type</option>
