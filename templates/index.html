<!DOCTYPE html>
<html> 
<head>    
<style> 

table,th,td{
    border: 2px solid rgb(201, 6, 6);
    padding:2px;
    border-collapse: collapse;
    text-align: center;
    background-color: rgb(207, 154, 154);
    margin-bottom:500px;
}
</style>
<title>Finance Manager</title>

</head>

<body style="background-color: rgb(207, 154, 154);">
    <h1>What is up my dudes</h1>


<table border=5 frame=red rules=rows, width = 100% text-align = center>   
    <tr style="border-bottom: 1px solid #ff0000;">
        <th> Transaction ID </th> 
         <th> Date </th> 
        <th> Amount </th>
        <th> Type </th>  
        <th> Source </th>
         <th> Description </th>
    </tr>
    <tbody> 
        <tr >
        {% for row in rows %}
          <td>{{row[0]}}</td><td> {{row[1]}} </td> <td> {{row[2]}} </td>   <td> {{row[3]}} </td>  <td> {{row[4]}} </td>   <td> {{row[5]}} </td> 
     </tr>   
      {% endfor %} 
    </tbody>

</table>
<style >
button  {
    border:  2px solid black;
    padding: 10px;
    font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
    display: inline-block;
    text-decoration: wavy;
    font-size: large;
    margin : 10px;
    gap: 100px;
    cursor: pointer;
} </style >


<form action="/add" method="POST">
  <input type="text" name="name" placeholder="Name" required>

  <input type="text" name="date" placeholder="YYYY-MM-DD" required>

  <input type="number" name="amount" step="0.01" placeholder="Amount" required>

  <select name="ttype" required>
    <option value="">Select type</option>
    <option value="income">income</option>
    <option value="expense">expense</option>
  </select>

  <input type="text" name="category" placeholder="Category" required>

  <input type="text" name="description" placeholder="Description (optional)">

    <button type="submit">Add</button> 
 
</form>
<form action="/delete" method="POST">
    <button type="submit">Delete</button> 
</form>
<form action="/export" method="GET">
    <button type="submit">Export</button>
</form>
    <button>View</button>
  
    <button>Graph</button>







<body>
<html>
